name: Release

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.5.6)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install app-builder-bin
        run: npm install -g app-builder-bin

      - name: Extract version from tag
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=${{ github.event.inputs.version }}
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Update version in package.json
        run: |
          npm version ${{ steps.get_version.outputs.version_number }} --no-git-tag-version
        shell: bash

      - name: Build TypeScript
        run: npm run build:lib

      - name: Build React app
        run: npm run build:react

      - name: Build and release (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --linux -p always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and release (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --x64 -p always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and release (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux -p always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
