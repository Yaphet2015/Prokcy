name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Debug Node/npm install state
        run: |
          node -v
          npm -v
          npm config get production
          npm ls electron @types/node typescript --depth=0 || true

      - name: Install app-builder-bin
        run: npm install -g app-builder-bin

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT
        shell: bash

      - name: Build TypeScript
        run: npm run build:lib

      - name: Build React app
        run: npm run build:react

      - name: Build package (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          npm run patch:electron-builder
          npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Build package (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --x64 --publish never

      - name: Build package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish never

      - name: Upload artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: macos-release-artifacts
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*-mac.yml
            dist/*.blockmap
          if-no-files-found: error
          retention-days: 30

      - name: Upload artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: windows-release-artifacts
          path: |
            dist/*.exe
            dist/latest*.yml
            dist/*.blockmap
          if-no-files-found: error
          retention-days: 30

      - name: Upload artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: linux-release-artifacts
          path: |
            dist/*.AppImage
            dist/latest-linux*.yml
            dist/*.blockmap
          if-no-files-found: error
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Show downloaded artifacts
        run: ls -R artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/macos-release-artifacts/*
            artifacts/windows-release-artifacts/*
            artifacts/linux-release-artifacts/*
          draft: false
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release exists
        run: |
          set -euo pipefail
          STATUS=$(curl -sS -o /tmp/release.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}")
          if [ "$STATUS" != "200" ]; then
            echo "Expected release for tag ${{ github.ref_name }}, got HTTP $STATUS"
            cat /tmp/release.json
            exit 1
          fi

  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Ensure Homebrew tap token is configured
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN is required to update Yaphet2015/homebrew-tap."
            echo "Create a fine-grained token with contents write access to Yaphet2015/homebrew-tap."
            exit 1
          fi

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: Yaphet2015/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Read release asset digests
        id: cask
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION_NUMBER="${VERSION#v}"

          asset_digest() {
            local asset_name="$1"
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${VERSION}" \
              --jq ".assets[] | select(.name == \"$asset_name\") | .digest"
          }

          require_sha256_digest() {
            local label="$1"
            local digest="$2"
            if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Expected sha256 digest for $label, got: ${digest:-<empty>}"
              exit 1
            fi
          }

          ARM_DIGEST="$(asset_digest "Prokcy-v${VERSION_NUMBER}-mac-arm64.dmg")"
          INTEL_DIGEST="$(asset_digest "Prokcy-v${VERSION_NUMBER}-mac-x64.dmg")"

          require_sha256_digest "mac arm64 DMG" "$ARM_DIGEST"
          require_sha256_digest "mac x64 DMG" "$INTEL_DIGEST"

          {
            echo "version_number=$VERSION_NUMBER"
            echo "arm_sha256=${ARM_DIGEST#sha256:}"
            echo "intel_sha256=${INTEL_DIGEST#sha256:}"
          } >> "$GITHUB_OUTPUT"

      - name: Update Prokcy cask
        env:
          VERSION_NUMBER: ${{ steps.cask.outputs.version_number }}
          ARM_SHA256: ${{ steps.cask.outputs.arm_sha256 }}
          INTEL_SHA256: ${{ steps.cask.outputs.intel_sha256 }}
        run: |
          set -euo pipefail
          ruby <<'RUBY'
          path = "homebrew-tap/Casks/prokcy.rb"
          version = ENV.fetch("VERSION_NUMBER")
          arm_sha = ENV.fetch("ARM_SHA256")
          intel_sha = ENV.fetch("INTEL_SHA256")

          text = File.read(path)
          abort "Missing version in #{path}" unless text.sub!(/version "[^"]+"/, "version \"#{version}\"")
          abort "Missing arm64 sha256 in #{path}" unless text.sub!(/on_arm do\n    sha256 "[0-9a-f]{64}"/, "on_arm do\n    sha256 \"#{arm_sha}\"")
          abort "Missing x64 sha256 in #{path}" unless text.sub!(/on_intel do\n    sha256 "[0-9a-f]{64}"/, "on_intel do\n    sha256 \"#{intel_sha}\"")
          File.write(path, text)
          RUBY

          ruby -c homebrew-tap/Casks/prokcy.rb

      - name: Commit and push Homebrew tap update
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- Casks/prokcy.rb; then
            echo "Prokcy cask is already current for ${{ github.ref_name }}."
            exit 0
          fi

          git add Casks/prokcy.rb
          git commit -m "prokcy ${{ steps.cask.outputs.version_number }}"
          git push
