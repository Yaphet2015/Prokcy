name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Debug Node/npm install state
        run: |
          node -v
          npm -v
          npm config get production
          npm ls electron @types/node typescript --depth=0 || true

      - name: Build TypeScript
        run: npm run build:lib

      - name: Run linter
        run: npm run lint || true
        continue-on-error: true

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Debug Node/npm install state
        run: |
          node -v
          npm -v
          npm config get production
          npm ls electron @types/node typescript --depth=0 || true

      - name: Build lib
        run: npm run build:lib

      - name: Build React app
        run: npm run build:react

      - name: Run tests
        run: npm test
        continue-on-error: true

  build-check:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Debug Node/npm install state
        run: |
          node -v
          npm -v
          npm config get production
          npm ls electron @types/node typescript --depth=0 || true

      - name: Build TypeScript
        run: npm run build:lib

      - name: Build React app
        run: npm run build:react

      - name: Verify build output
        run: |
          node -e "const fs=require('fs'); const path=require('path'); const list=(dir)=>fs.readdirSync(dir).slice(0,5); if(!fs.existsSync('dist-lib')){throw new Error('dist-lib missing');} if(!fs.existsSync('dist-react')){throw new Error('dist-react missing');} const libJs=fs.readdirSync('dist-lib').filter(f=>f.endsWith('.js')); if(libJs.length===0){throw new Error('No JS files in dist-lib');} console.log('=== Checking TypeScript build ==='); console.log(libJs.slice(0,5).map(f=>path.join('dist-lib',f)).join('\n')); console.log('=== Checking React build ==='); console.log(list('dist-react').map(f=>path.join('dist-react',f)).join('\n'));"
