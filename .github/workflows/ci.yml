name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Debug Node/npm install state
        run: |
          node -v
          npm -v
          npm config get production
          npm ls electron @types/node typescript --depth=0 || true

      - name: Build TypeScript
        run: npm run build:lib

      - name: Run linter
        run: npm run lint || true
        continue-on-error: true

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Debug Node/npm install state
        run: |
          node -v
          npm -v
          npm config get production
          npm ls electron @types/node typescript --depth=0 || true

      - name: Build lib
        run: npm run build:lib

      - name: Build React app
        run: npm run build:react

      - name: Run tests
        run: npm test
        continue-on-error: true

  build-check:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Debug Node/npm install state
        run: |
          node -v
          npm -v
          npm config get production
          npm ls electron @types/node typescript --depth=0 || true

      - name: Build TypeScript
        run: npm run build:lib

      - name: Build React app
        run: npm run build:react

      - name: Verify build output
        run: |
          echo "=== Checking TypeScript build ==="
          ls -la dist-lib/*.js | head -5
          echo "=== Checking React build ==="
          ls -la dist-react/ | head -5
